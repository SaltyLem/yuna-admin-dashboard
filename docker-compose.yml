services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=yuna_admin
      - POSTGRES_PASSWORD=yuna_admin_local
      - POSTGRES_DB=yuna_admin
    volumes:
      - dev-db-data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://localhost:4101
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - frontend-next-cache:/app/.next
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4101:4100"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://yuna_admin:yuna_admin_local@db:5432/yuna_admin
      - YUNA_API_URL=http://host.docker.internal:4000
      - OLLAMA_URL=http://192.168.11.17:11434
    volumes:
      - ./backend/src:/app/src
      - dev-admin-data:/data
    depends_on:
      - db
    restart: unless-stopped

volumes:
  dev-db-data:
  dev-admin-data:
  frontend-next-cache:
