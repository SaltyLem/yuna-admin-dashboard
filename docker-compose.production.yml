services:
  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://192.168.11.13:4100
    restart: unless-stopped

  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4100:4100"
    env_file:
      - ../../.env
    environment:
      - REDIS_STREAM_URL=redis://192.168.11.13:6381
      - SQLITE_PATH=/data/viewers.db
    volumes:
      - admin-data:/data
    restart: unless-stopped

volumes:
  admin-data:
