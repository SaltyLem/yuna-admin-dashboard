services:
  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://localhost:4100
    restart: unless-stopped

  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4100:4100"
    env_file:
      - ../../.env
    restart: unless-stopped
