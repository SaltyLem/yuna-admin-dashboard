services:
  admin-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=yuna_admin
      - POSTGRES_PASSWORD=yuna_admin_local
      - POSTGRES_DB=yuna_admin
    volumes:
      - admin-db-data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://192.168.11.13:4100
    restart: unless-stopped

  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4100:4100"
    env_file:
      - ../../.env
    environment:
      - REDIS_STREAM_URL=redis://192.168.11.13:6381
      - YUNA_REDIS_URL=redis://yuna-redis:6379
      - OLLAMA_URL=http://192.168.11.17:11434
      - SQLITE_PATH=/data/viewers.db
      - DATABASE_URL=postgresql://yuna_admin:yuna_admin_local@admin-db:5432/yuna_admin
      - VIDEO_OUT_DIR=/video-out
    volumes:
      - admin-data:/data
      # Docker socket for /docker/* (live log viewer) and per-container
      # stats collection in the metrics worker.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host /proc + /sys for the metrics collector (CPU / memory /
      # network). Read-only so the container can't affect the host.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # yuna-video output directory for mp4 / scenario preview.
      - ../yuna-video/out:/video-out:ro
    depends_on:
      - admin-db
    restart: unless-stopped

volumes:
  admin-data:
  admin-db-data:
