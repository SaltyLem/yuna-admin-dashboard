services:
  admin-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=yuna_admin
      - POSTGRES_PASSWORD=yuna_admin_local
      - POSTGRES_DB=yuna_admin
    volumes:
      - admin-db-data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://192.168.11.13:4100
    restart: unless-stopped

  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4100:4100"
    env_file:
      - ../../.env
    environment:
      - REDIS_STREAM_URL=redis://192.168.11.13:6381
      - SQLITE_PATH=/data/viewers.db
      - DATABASE_URL=postgresql://yuna_admin:yuna_admin_local@admin-db:5432/yuna_admin
    volumes:
      - admin-data:/data
    depends_on:
      - admin-db
    restart: unless-stopped

volumes:
  admin-data:
  admin-db-data:
